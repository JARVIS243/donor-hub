{% extends 'base.html' %}

{% block title %}Request Blood{% endblock %}

{% block content %}

<h2 class="text-center text-danger mb-4">Blood Request Form 🚑</h2>

<form method="POST" class="shadow p-4 rounded bg-light">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Patient Name" class="form-control mb-3" required>

    <select name="blood" class="form-control mb-3" required>
        <option value="">Select Blood Group</option>
        <option>A+</option>
        <option>B+</option>
        <option>O+</option>
        <option>AB+</option>
        <option>A-</option>
        <option>B-</option>
        <option>O-</option>
        <option>AB-</option>
    </select>

    <input type="number" name="units" placeholder="Units Needed" class="form-control mb-3" required>

    <input type="text" name="hospital" placeholder="Hospital Name" class="form-control mb-3" required>

    <input type="text" name="contact" placeholder="Contact Number" class="form-control mb-3" required>

    <button type="submit" class="btn btn-danger w-100">Submit Request</button>
</form>

{% endblock %}
