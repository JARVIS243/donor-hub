{% extends 'base.html' %}

{% block title %}Edit Request{% endblock %}

{% block content %}

<h2 class="text-center text-danger mb-4">Edit Emergency Request</h2>

<form method="POST" class="shadow p-4 rounded bg-light">
    {% csrf_token %}

    <input type="text" name="name" value="{{ r.patient_name }}" class="form-control mb-3" required>

    <select name="blood" class="form-control mb-3" required>
        <option selected>{{ r.blood_group }}</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>O+</option><option>O-</option>
        <option>AB+</option><option>AB-</option>
    </select>

    <input type="number" name="units" value="{{ r.units_needed }}" class="form-control mb-3" required>

    <input type="text" name="hospital" value="{{ r.hospital }}" class="form-control mb-3" required>

    <input type="text" name="contact" value="{{ r.contact }}" class="form-control mb-3" required>

    <button class="btn btn-danger w-100">Update Request</button>
</form>

{% endblock %}
